<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tino Automation 2026</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #00ffcc; }
    /* Estilos para la barra lateral */
    .sidebar { background-color: #000 !important; border-right: 1px solid #1a1a1a; }
    .sidebar-nav li a { color: #888 !important; }
    .sidebar-nav li.active > a { color: #00ffcc !important; font-weight: bold; }

    /* Estilos para la portada */
    section.cover {
      background: linear-gradient(135deg, #000000 0%, #004d40 100%) !important;
    }
    section.cover .cover-main { color: #fff; }
    section.cover a { color: #00ffcc; border-color: #00ffcc; }
    section.cover a:hover { background-color: #00ffcc; color: #000; }

    /* Bloques de código neón */
    .markdown-section code { background-color: #111 !important; color: #00ffcc !important; }
  </style>
</head>
<body>
  <div id="app">Cargando Academia de Automatización...</div>
  <script>
    window.$docsify = {
      name: 'TINO AUTOMATION',
      repo: 'https://github.com/agustino8080/Cursos2026',
      loadSidebar: true,
      coverpage: true,
      executeScript: true,
      auto2top: true,
      subMaxLevel: 3,
      homepage: 'README.md', // Obligamos a usar este archivo como inicio
      notFoundPage: true,    // Habilitamos fallback
    }
  </script>
  <!-- Plugins necesarios -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
