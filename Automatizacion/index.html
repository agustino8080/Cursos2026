<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Master en Automatización 2026 - Agustín Pizarro</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Curso intensivo de Automatización con Python">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #00ffcc; }
    .sidebar { background-color: #000; color: #fff; }
    .markdown-section code { background-color: #1a1a1a; color: #00ffcc; }
    /* Fondo degradado para la portada */
    section.cover {
      background: linear-gradient(135deg, #000000 0%, #004d40 100%) !important;
    }
    section.cover .cover-main {
      color: #fff;
    }
    section.cover a {
      color: #00ffcc;
      border-color: #00ffcc;
    }
    section.cover a:hover {
      background-color: #00ffcc;
      color: #000;
    }
  </style>
</head>
<body>
  <div id="app">Cargando curso...</div>
  <script>
    window.$docsify = {
      name: 'TINO AUTOMATION',
      repo: 'https://github.com/agustino8080/Cursos2026',
      loadSidebar: true,
      subMaxLevel: 2,
      coverpage: true,
      auto2top: true,
      search: 'auto',
      placeholder: 'Buscar tema...'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
